name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - master
      - develop

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm run test -- --runInBand

      - name: Build
        run: npm run build

  e2e-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: booking_system
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 5382
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d booking_system"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:5382@localhost:5432/booking_system
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-only-secret
      JWT_EXPIRES_IN: 3600
      FRONTEND_URL: http://localhost:3000
      FRONTEND_URLS: http://localhost:3000,http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/v1
      E2E_BASE_URL: http://127.0.0.1:3000
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: Cho-Geer/booking-backend
          token: ${{ secrets.GITHUB_TOKEN }}
          path: backend
          ref: ${{ github.ref_name == 'develop' && 'develop' || 'master' }}  # 根据前端分支选择对应后端分支

      - name: Debug backend checkout
        run: |
          echo "Listing backend directory:"
          ls -la backend/
          echo "Checking package.json:"
          cat backend/package.json | grep -A 5 -B 5 prisma:generate

      - name: Setup Node for backend
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --include=dev
        working-directory: ./backend

      - name: Prisma generate
        run: npm run prisma:generate
        working-directory: ./backend

      - name: Prisma migrate deploy
        run: npm run prisma:deploy
        working-directory: ./backend
      - name: Debug - Show environment info
        working-directory: ./backend
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "TypeScript version: $(npx tsc --version)"
          echo "ts-node version: $(npx ts-node --version)"

      - name: Debug - Check @prisma/client installation
        working-directory: ./backend
        run: |
          echo "Checking node_modules/@prisma/client..."
          ls -la node_modules/@prisma/client || echo "@prisma/client not found!"
          echo "Checking node_modules/.prisma/client..."
          ls -la node_modules/.prisma/client || echo ".prisma/client not found!"

      - name: Prisma seed
        working-directory: ./backend
        run:  npx prisma db seed

      - name: Start backend server
        run: npm run start:dev &
        working-directory: ./backend
        env:
          PORT: 3001
          REDIS_URL: redis://localhost:6379

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3001/v1/health > /dev/null; then
              echo "Backend is up!"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Setup Node for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json


      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Start frontend server
        run: npm run dev &
        working-directory: frontend
        env:
          PORT: 3000

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Frontend is up!"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1

      - name: E2E tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_API_URL: http://localhost:3001/v1
          CI: true
