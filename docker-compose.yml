version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booking_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 5382
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ci-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ci-network

  # CI runner service - uses host network to access services
  ci-runner:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - ../booking-backend:/backend
      - .:/frontend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:5382@postgres:5432/booking_system
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ci-only-secret
      JWT_EXPIRES_IN: 3600
      FRONTEND_URL: http://localhost:3000
      FRONTEND_URLS: http://localhost:3000,http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/v1
      E2E_BASE_URL: http://127.0.0.1:3000
      CI: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ci-network
    # This container will be run with a specific command
    # Use: docker-compose run --rm ci-runner /bin/sh -c "cd /backend && npm ci --include=dev"

networks:
  ci-network:
    driver: bridge